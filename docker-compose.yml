services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nove
      POSTGRES_USER: nove
      POSTGRES_PASSWORD: nove
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nove -d nove"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - nove-postgres:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - nove-qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://nove:nove@postgres:5432/nove
      QDRANT_URL: http://qdrant:6333
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"

  web:
    build: ./apps/web
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  nove-postgres:
  nove-qdrant:
